# GitHub Actions workflow for deploying Azure Function App
# Uses remote build for Python dependencies
name: 2. Deploy Azure Functions

on:
  push:
    branches:
      - main
    paths:
      - 'function_app.py'
      - 'pdf_generator.py'
      - 'requirements.txt'
      - 'host.json'
      - '.github/workflows/deploy-function.yml'
  workflow_dispatch:
    inputs:
      functionAppName:
        description: 'Function App name (leave empty to use secret)'
        required: false
      resourceGroup:
        description: 'Resource Group name'
        required: false
        default: 'healthtranscribe-uk-rg'

env:
  PYTHON_VERSION: '3.11'
  RESOURCE_GROUP: ${{ github.event.inputs.resourceGroup || 'healthtranscribe-uk-rg' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Function App Name
        id: set-name
        run: |
          if [ -n "${{ github.event.inputs.functionAppName }}" ]; then
            echo "name=${{ github.event.inputs.functionAppName }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ secrets.AZURE_FUNCTIONAPP_NAME }}" >> $GITHUB_OUTPUT
          fi

      - name: Validate Function App Name
        run: |
          if [ -z "${{ steps.set-name.outputs.name }}" ]; then
            echo "❌ Error: Function App name not set!"
            echo "Please either:"
            echo "  1. Set AZURE_FUNCTIONAPP_NAME as a repository secret"
            echo "  2. Or provide functionAppName when triggering workflow manually"
            exit 1
          fi
          echo "✓ Using Function App: ${{ steps.set-name.outputs.name }}"

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies to packages folder
        run: |
          pip install --upgrade pip
          mkdir -p .python_packages/lib/site-packages
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Generate function metadata
        run: |
          rm -rf .generated-functions
          mkdir -p .generated-functions

          python - <<'PY'
          import pathlib
          import sys

          sys.path.insert(0, '.')
          import function_app

          output_root = pathlib.Path('.generated-functions')
          for fn in function_app.app.get_functions():
              fn_dir = output_root / fn.get_function_name()
              fn_dir.mkdir(parents=True, exist_ok=True)
              (fn_dir / 'function.json').write_text(fn.get_function_json(), encoding='utf-8')
          PY

      - name: Create deployment package
        run: |
          rm -f deploy.zip
          zip -r deploy.zip \
            function_app.py \
            pdf_generator.py \
            host.json \
            requirements.txt \
            .python_packages \
            -x "*.pyc" \
            -x "*__pycache__*" \
            -x "*.dist-info/*"
          (
            cd .generated-functions
            zip -r ../deploy.zip .
          )
          echo "Package size: $(ls -lh deploy.zip | awk '{print $5}')"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure package deployment mode
        run: |
          az functionapp config appsettings set \
            --name "${{ steps.set-name.outputs.name }}" \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              ENABLE_ORYX_BUILD=false \
              WEBSITE_RUN_FROM_PACKAGE=1 \
              AzureWebJobsFeatureFlags=EnableWorkerIndexing \
              PYTHON_ENABLE_INIT_INDEXING=1 \
            --output none

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ steps.set-name.outputs.name }}
          package: deploy.zip
          scm-do-build-during-deployment: false
          enable-oryx-build: false

      - name: Restart function app
        run: |
          FUNC_NAME="${{ steps.set-name.outputs.name }}"
          echo "🔄 Restarting function app..."
          sleep 30
          az functionapp restart --name $FUNC_NAME --resource-group ${{ env.RESOURCE_GROUP }}
          sleep 30

      - name: Verify deployment
        run: |
          FUNC_NAME="${{ steps.set-name.outputs.name }}"
          echo "🔍 Verifying deployment..."

          HEALTH_URL="https://$FUNC_NAME.azurewebsites.net/api/health"
          HEALTH_JSON=$(curl -fsS --retry 6 --retry-delay 10 --retry-all-errors "$HEALTH_URL")
          echo "$HEALTH_JSON"

          python - <<'PY' <<<"$HEALTH_JSON"
          import json
          import sys

          payload = json.load(sys.stdin)
          bad_dependencies = [
              name for name, details in (payload.get("dependencies") or {}).items()
              if details.get("status") != "healthy"
          ]

          if payload.get("status") != "healthy":
              raise SystemExit(
                  f"Health check failed with status={payload.get('status')} bad_dependencies={bad_dependencies}"
              )

          print(f"Health check passed with dependencies={sorted((payload.get('dependencies') or {}).keys())}")
          PY

          PROTECTED_STATUS=$(curl -sS -o /tmp/protected_response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"source":"deployment-smoke","language":"en-US"}' \
            "https://$FUNC_NAME.azurewebsites.net/api/encounters")

          if [ "$PROTECTED_STATUS" -ne 401 ]; then
            echo "❌ Expected anonymous POST /api/encounters to return 401, got $PROTECTED_STATUS"
            cat /tmp/protected_response.txt
            exit 1
          fi

          echo "Protected-route smoke check passed with expected 401 response."
          
          # List functions
          echo ""
          echo "📋 Deployed functions:"
          az functionapp function list --name $FUNC_NAME --resource-group ${{ env.RESOURCE_GROUP }} -o table || echo "Loading..."

      - name: Output summary
        run: |
          FUNC_NAME="${{ steps.set-name.outputs.name }}"
          echo "## Function App Deployed! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Function App:** \`$FUNC_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "**API URL:** https://$FUNC_NAME.azurewebsites.net/api/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Endpoints:" >> $GITHUB_STEP_SUMMARY
          echo "- Health: \`/api/health\`" >> $GITHUB_STEP_SUMMARY
          echo "- Upload: \`/api/upload\`" >> $GITHUB_STEP_SUMMARY
          echo "- Status: \`/api/status/{job_id}\`" >> $GITHUB_STEP_SUMMARY
