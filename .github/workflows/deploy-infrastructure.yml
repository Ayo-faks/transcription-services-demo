# GitHub Actions workflow for deploying Azure Infrastructure via Bicep
# This workflow provisions all Azure resources needed for the Healthcare Transcription Services
name: 1. Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev, staging, prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      resourceGroup:
        description: 'Azure Resource Group name'
        required: true
        default: 'healthtranscribe-uk-rg'
      location:
        description: 'Azure region'
        required: true
        default: 'uksouth'

env:
  AZURE_RESOURCE_GROUP: ${{ github.event.inputs.resourceGroup || 'healthtranscribe-uk-rg' }}
  AZURE_LOCATION: ${{ github.event.inputs.location || 'uksouth' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Bicep Template
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create resource group if not exists
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ env.AZURE_LOCATION }} \
            --output none || true

      - name: Validate Bicep template
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: ./infra/main.bicep
          parameters: >
            environment=${{ github.event.inputs.environment || 'dev' }}
            location=${{ env.AZURE_LOCATION }}
          deploymentMode: Validate

  deploy:
    runs-on: ubuntu-latest
    name: Deploy Infrastructure
    needs: validate
    outputs:
      functionAppName: ${{ steps.deploy.outputs.functionAppName }}
      frontendStorageAccountName: ${{ steps.deploy.outputs.frontendStorageAccountName }}
      functionAppUrl: ${{ steps.deploy.outputs.functionAppUrl }}
      frontendWebsiteUrl: ${{ steps.deploy.outputs.frontendWebsiteUrl }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep template
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: ./infra/main.bicep
          parameters: >
            environment=${{ github.event.inputs.environment || 'dev' }}
            location=${{ env.AZURE_LOCATION }}
          deploymentName: 'github-${{ github.run_number }}'

      - name: Wait for RBAC propagation
        run: |
          echo "Waiting 60 seconds for RBAC role assignments to propagate..."
          sleep 60

      - name: Output deployment results
        run: |
          echo "## Deployment Complete! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources Created:" >> $GITHUB_STEP_SUMMARY
          echo "- **Function App:** \`${{ steps.deploy.outputs.functionAppName }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Function URL:** ${{ steps.deploy.outputs.functionAppUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend Storage Account:** \`${{ steps.deploy.outputs.frontendStorageAccountName }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend URL:** ${{ steps.deploy.outputs.frontendWebsiteUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Required: Set GitHub Secrets" >> $GITHUB_STEP_SUMMARY
          echo "Before running deployment workflows, add these secrets:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. **\`AZURE_FUNCTIONAPP_NAME\`**: \`${{ steps.deploy.outputs.functionAppName }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Add the Function App secret above to your repository" >> $GITHUB_STEP_SUMMARY
          echo "2. Run 'Deploy Azure Functions' workflow" >> $GITHUB_STEP_SUMMARY
          echo "3. Run 'Deploy Frontend' workflow" >> $GITHUB_STEP_SUMMARY
