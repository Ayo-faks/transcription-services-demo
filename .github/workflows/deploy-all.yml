# Complete deployment workflow - Infrastructure + Function App + Frontend
# Use this for initial deployment or full redeployment
name: 0. Deploy All (Complete)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      resourceGroup:
        description: 'Azure Resource Group name'
        required: true
        default: 'healthtranscribe-uk-rg'
      functionAppName:
        description: 'Existing Function App name when skipping infrastructure'
        required: false
        default: ''
      location:
        description: 'Azure region'
        required: true
        default: 'uksouth'
      allowedOrigin:
        description: 'Frontend origin for Function App CORS and Easy Auth redirects'
        required: false
        default: ''
      voiceLiveGatewayBaseUrl:
        description: 'Optional Voice Live gateway base URL override for frontend config.js'
        required: false
        default: ''
      skipInfrastructure:
        description: 'Skip infrastructure deployment (use existing resources)'
        required: false
        default: false
        type: boolean

env:
  AZURE_RESOURCE_GROUP: ${{ github.event.inputs.resourceGroup }}
  AZURE_LOCATION: ${{ github.event.inputs.location }}
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================================================
  # Step 1: Deploy Infrastructure (if not skipped)
  # ============================================================================
  infrastructure:
    if: ${{ github.event.inputs.skipInfrastructure != 'true' }}
    runs-on: ubuntu-latest
    name: 1️⃣ Deploy Infrastructure
    outputs:
      functionAppName: ${{ steps.deploy.outputs.functionAppName }}
      frontendStorageAccountName: ${{ steps.deploy.outputs.frontendStorageAccountName }}
      functionAppUrl: ${{ steps.deploy.outputs.functionAppUrl }}
      frontendWebsiteUrl: ${{ steps.deploy.outputs.frontendWebsiteUrl }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create resource group
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ env.AZURE_LOCATION }} \
            --output none || true

      - name: Deploy Bicep template
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: ./infra/main.bicep
          parameters: >
            environment=${{ github.event.inputs.environment }}
            location=${{ env.AZURE_LOCATION }}
            allowedOrigin=${{ github.event.inputs.allowedOrigin }}
          deploymentName: 'full-deploy-${{ github.run_number }}'

      - name: Wait for RBAC propagation
        run: |
          echo "⏳ Waiting 90 seconds for RBAC role assignments to propagate..."
          sleep 90

      - name: Output infrastructure details
        run: |
          echo "## Infrastructure Deployed ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Name |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Function App | \`${{ steps.deploy.outputs.functionAppName }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Storage Account | \`${{ steps.deploy.outputs.frontendStorageAccountName }}\` |" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # Step 2: Deploy Function App
  # ============================================================================
  function-app:
    runs-on: ubuntu-latest
    name: 2️⃣ Deploy Function App
    needs: [infrastructure]
    if: always() && (needs.infrastructure.result == 'success' || needs.infrastructure.result == 'skipped')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine Function App Name
        id: func-name
        run: |
          if [ "${{ github.event.inputs.skipInfrastructure }}" == "true" ]; then
            NAME="${{ github.event.inputs.functionAppName }}"
          else
            NAME="${{ needs.infrastructure.outputs.functionAppName }}"
          fi
          
          if [ -z "$NAME" ]; then
            echo "❌ Function App name not available!"
            echo "Set the functionAppName workflow input or run infrastructure deployment"
            exit 1
          fi
          
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "✓ Function App: $NAME"

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build deployment package
        run: |
          python scripts/build_function_package.py --output deploy.zip --python python

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure package deployment mode
        run: |
          FUNC_NAME="${{ steps.func-name.outputs.name }}"

          az functionapp config appsettings set \
            --name "$FUNC_NAME" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              ENABLE_ORYX_BUILD=false \
              WEBSITE_RUN_FROM_PACKAGE=1 \
              AzureWebJobsFeatureFlags=EnableWorkerIndexing \
              PYTHON_ENABLE_INIT_INDEXING=1 \
            --output none

      - name: Deploy Function App
        run: |
          FUNC_NAME="${{ steps.func-name.outputs.name }}"
          
          CREDS=$(az webapp deployment list-publishing-credentials \
            --name $FUNC_NAME \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[publishingUserName, publishingPassword]" -o tsv)
          USER=$(echo "$CREDS" | head -1)
          PASS=$(echo "$CREDS" | tail -1)
          
          HTTP_CODE=$(curl -s -X POST \
            --user "$USER:$PASS" \
            --data-binary @deploy.zip \
            -H "Content-Type: application/zip" \
            --max-time 600 \
            -w "%{http_code}" \
            -o /tmp/deploy_response.txt \
            "https://$FUNC_NAME.scm.azurewebsites.net/api/zipdeploy?isAsync=false")
          
          if [ "$HTTP_CODE" -eq "200" ] || [ "$HTTP_CODE" -eq "202" ]; then
            echo "✅ Function App deployed!"
          else
            echo "❌ Deployment failed: $HTTP_CODE"
            exit 1
          fi

      - name: Restart and verify
        run: |
          FUNC_NAME="${{ steps.func-name.outputs.name }}"
          sleep 30
          az functionapp restart --name $FUNC_NAME --resource-group ${{ env.AZURE_RESOURCE_GROUP }}
          sleep 30

          HEALTH_URL="https://$FUNC_NAME.azurewebsites.net/api/health"
          HEALTH_JSON=$(curl -fsS --retry 6 --retry-delay 10 --retry-all-errors "$HEALTH_URL")
          echo "$HEALTH_JSON"

          python - <<'PY' <<<"$HEALTH_JSON"
          import json
          import sys

          payload = json.load(sys.stdin)
          bad_dependencies = [
            name for name, details in (payload.get("dependencies") or {}).items()
            if details.get("status") != "healthy"
          ]

          if payload.get("status") != "healthy":
            raise SystemExit(
              f"Health check failed with status={payload.get('status')} bad_dependencies={bad_dependencies}"
            )

          print(f"Health check passed with dependencies={sorted((payload.get('dependencies') or {}).keys())}")
          PY

          PROTECTED_STATUS=$(curl -sS -o /tmp/protected_response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"source":"deployment-smoke","language":"en-US"}' \
            "https://$FUNC_NAME.azurewebsites.net/api/encounters")

          if [ "$PROTECTED_STATUS" -ne 401 ]; then
            echo "❌ Expected anonymous POST /api/encounters to return 401, got $PROTECTED_STATUS"
            cat /tmp/protected_response.txt
            exit 1
          fi

          echo "Protected-route smoke check passed with expected 401 response."

  # ============================================================================
  # Step 3: Deploy Frontend
  # ============================================================================
  frontend:
    runs-on: ubuntu-latest
    name: 3️⃣ Deploy Frontend
    needs: [infrastructure, function-app]
    if: always() && needs.function-app.result == 'success'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Determine Function App Name
        id: frontend_func_name
        run: |
          if [ "${{ github.event.inputs.skipInfrastructure }}" == "true" ]; then
            FUNC_NAME="${{ github.event.inputs.functionAppName }}"
          else
            FUNC_NAME="${{ needs.infrastructure.outputs.functionAppName }}"
          fi

          if [ -z "$FUNC_NAME" ]; then
            FUNC_NAME=$(az functionapp list -g ${{ env.AZURE_RESOURCE_GROUP }} --query "[0].name" -o tsv)
          fi

          echo "name=$FUNC_NAME" >> $GITHUB_OUTPUT
          echo "✓ Function App: $FUNC_NAME"

      - name: Validate staging auth and tenant bootstrap preflight
        if: ${{ github.event.inputs.environment == 'staging' || github.event.inputs.environment == 'prod' }}
        env:
          EXPECTED_ALLOWED_ORIGIN: ${{ github.event.inputs.allowedOrigin }}
        run: |
          FUNC_NAME="${{ steps.frontend_func_name.outputs.name }}"

          if [ -z "$EXPECTED_ALLOWED_ORIGIN" ]; then
            echo "❌ allowedOrigin input is required for staging and prod deployments"
            exit 1
          fi

          AUTH_JSON=$(az webapp auth show --name "$FUNC_NAME" --resource-group ${{ env.AZURE_RESOURCE_GROUP }} -o json)
          CORS_JSON=$(az functionapp cors show --name "$FUNC_NAME" --resource-group ${{ env.AZURE_RESOURCE_GROUP }} -o json)
          APP_SETTINGS_JSON=$(az functionapp config appsettings list --name "$FUNC_NAME" --resource-group ${{ env.AZURE_RESOURCE_GROUP }} -o json)

          AUTH_JSON="$AUTH_JSON" CORS_JSON="$CORS_JSON" APP_SETTINGS_JSON="$APP_SETTINGS_JSON" EXPECTED_ALLOWED_ORIGIN="$EXPECTED_ALLOWED_ORIGIN" python - <<'PY'
          import json
          import os

          auth = json.loads(os.environ["AUTH_JSON"])
          cors = json.loads(os.environ["CORS_JSON"])
          app_settings = {
              item["name"]: item.get("value", "")
              for item in json.loads(os.environ["APP_SETTINGS_JSON"])
              if item.get("name")
          }
          expected_allowed_origin = os.environ["EXPECTED_ALLOWED_ORIGIN"]
          errors = []

          if not auth.get("platform", {}).get("enabled"):
              errors.append("Easy Auth platform.enabled is false")

          global_validation = auth.get("globalValidation", {})
          if not global_validation.get("requireAuthentication"):
              errors.append("Easy Auth requireAuthentication is false")
          if global_validation.get("unauthenticatedClientAction") != "Return401":
              errors.append(
                  f"Easy Auth unauthenticatedClientAction expected Return401 got {global_validation.get('unauthenticatedClientAction')}"
              )
          if "/api/health" not in (global_validation.get("excludedPaths") or []):
              errors.append("Easy Auth excludedPaths is missing /api/health")

          providers = auth.get("identityProviders", {})
          aad_enabled = bool(providers.get("azureActiveDirectory", {}).get("enabled"))
          google_enabled = bool(providers.get("google", {}).get("enabled"))
          if not (aad_enabled or google_enabled):
              errors.append("No Easy Auth identity provider is enabled")

          if aad_enabled and not app_settings.get("MICROSOFT_PROVIDER_AUTHENTICATION_SECRET"):
              errors.append("MICROSOFT_PROVIDER_AUTHENTICATION_SECRET is empty while Azure AD auth is enabled")
          if google_enabled and not app_settings.get("GOOGLE_PROVIDER_AUTHENTICATION_SECRET"):
              errors.append("GOOGLE_PROVIDER_AUTHENTICATION_SECRET is empty while Google auth is enabled")

          required_settings = [
              "COSMOS_ENDPOINT",
              "PLATFORM_USERS_CONTAINER_NAME",
              "PLATFORM_TENANTS_CONTAINER_NAME",
              "PLATFORM_VOICE_SESSIONS_CONTAINER_NAME",
              "DEFAULT_TENANT_ID",
          ]
          for name in required_settings:
              if not app_settings.get(name):
                  errors.append(f"Missing required app setting {name}")

          allowed_origins = cors.get("allowedOrigins") or []
          if expected_allowed_origin not in allowed_origins:
              errors.append(
                  f"CORS allowedOrigins does not contain expected origin {expected_allowed_origin}; actual={allowed_origins}"
              )

          if errors:
              raise SystemExit("\n".join(errors))

          print(
              f"Staging auth/bootstrap preflight passed: aad_enabled={aad_enabled} google_enabled={google_enabled} default_tenant_id={app_settings.get('DEFAULT_TENANT_ID')}"
          )
          PY

      - name: Run backend staging preflight smoke
        if: ${{ github.event.inputs.environment == 'staging' || github.event.inputs.environment == 'prod' }}
        run: |
          chmod +x ./scripts/staging-smoke.sh
          ./scripts/staging-smoke.sh \
            --api-base-url "https://${{ steps.frontend_func_name.outputs.name }}.azurewebsites.net/api"

      - name: Update frontend configuration
        run: |
          FUNC_NAME="${{ steps.frontend_func_name.outputs.name }}"
          API_BASE_URL="https://${FUNC_NAME}.azurewebsites.net/api"
          VOICE_LIVE_GATEWAY_BASE_URL="${{ github.event.inputs.voiceLiveGatewayBaseUrl }}"

          perl -0pi -e "s|window\\.APP_CONFIG\\.apiBaseUrl = '.*?';|window.APP_CONFIG.apiBaseUrl = '$API_BASE_URL';|" frontend-react/public/config.js

          if [ -n "$VOICE_LIVE_GATEWAY_BASE_URL" ]; then
            perl -0pi -e "s|gatewayBaseUrl: '.*?'|gatewayBaseUrl: '$VOICE_LIVE_GATEWAY_BASE_URL'|" frontend-react/public/config.js
          fi

          grep -q "window.APP_CONFIG.apiBaseUrl = '$API_BASE_URL';" frontend-react/public/config.js
          grep -q "window.APP_CONFIG.voiceLive" frontend-react/public/config.js

          echo "✓ Frontend configured to use: $API_BASE_URL"
          cat frontend-react/public/config.js

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend-react
        run: npm ci

      - name: Build React frontend
        working-directory: frontend-react
        run: npm run build

      - name: Determine frontend storage account
        id: frontend-storage
        run: |
          if [ "${{ github.event.inputs.skipInfrastructure }}" == "true" ]; then
            ACCOUNT_NAME=$(az storage account list \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "[?tags.role=='frontend-static-site'].name | [0]" \
              -o tsv)
          else
            ACCOUNT_NAME="${{ needs.infrastructure.outputs.frontendStorageAccountName }}"
          fi

          if [ -z "$ACCOUNT_NAME" ]; then
            echo "❌ Frontend storage account not found"
            exit 1
          fi

          echo "name=$ACCOUNT_NAME" >> $GITHUB_OUTPUT
          echo "✓ Frontend storage account: $ACCOUNT_NAME"

      - name: Enable static website
        run: |
          ACCOUNT_NAME="${{ steps.frontend-storage.outputs.name }}"

          az storage blob service-properties update \
            --account-name "$ACCOUNT_NAME" \
            --auth-mode login \
            --static-website \
            --index-document index.html \
            --404-document index.html

      - name: Grant frontend upload access
        run: |
          ACCOUNT_NAME="${{ steps.frontend-storage.outputs.name }}"
          ACCOUNT_ID=$(az storage account show --name "$ACCOUNT_NAME" --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query id -o tsv)
          APP_ID=$(az account show --query user.name -o tsv)
          OBJECT_ID=$(az ad sp show --id "$APP_ID" --query id -o tsv)

          az role assignment create \
            --assignee-object-id "$OBJECT_ID" \
            --assignee-principal-type ServicePrincipal \
            --role "Storage Blob Data Contributor" \
            --scope "$ACCOUNT_ID" \
            --only-show-errors || true

          sleep 30

      - name: Deploy Frontend
        run: |
          ACCOUNT_NAME="${{ steps.frontend-storage.outputs.name }}"

          az storage blob delete-batch \
            --account-name "$ACCOUNT_NAME" \
            --auth-mode login \
            --source '$web' \
            --pattern '*' || true

          az storage blob upload-batch \
            --account-name "$ACCOUNT_NAME" \
            --auth-mode login \
            --destination '$web' \
            --source frontend-react/dist \
            --overwrite

      - name: Run staging smoke script
        run: |
          FRONTEND_URL=$(az storage account show \
            --name "${{ steps.frontend-storage.outputs.name }}" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query 'primaryEndpoints.web' -o tsv)

          chmod +x ./scripts/staging-smoke.sh
          ./scripts/staging-smoke.sh \
            --api-base-url "https://${{ steps.frontend_func_name.outputs.name }}.azurewebsites.net/api" \
            --frontend-url "$FRONTEND_URL"

  # ============================================================================
  # Summary
  # ============================================================================
  summary:
    runs-on: ubuntu-latest
    name: 📋 Deployment Summary
    needs: [infrastructure, function-app, frontend]
    if: always()
    
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        if: needs.frontend.result == 'success'
        continue-on-error: true
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get deployment URLs
        id: urls
        if: needs.frontend.result == 'success'
        continue-on-error: true
        run: |
          FUNC_NAME=$(az functionapp list -g ${{ env.AZURE_RESOURCE_GROUP }} --query "[0].defaultHostName" -o tsv 2>/dev/null || echo "")
          FRONTEND_URL=$(az storage account list \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?tags.role=='frontend-static-site'].primaryEndpoints.web | [0]" \
            -o tsv 2>/dev/null || echo "")
          echo "func_url=https://$FUNC_NAME" >> $GITHUB_OUTPUT
          echo "frontend_url=$FRONTEND_URL" >> $GITHUB_OUTPUT

      - name: Generate summary
        run: |
          echo "# Deployment Summary 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Infrastructure | ${{ needs.infrastructure.result == 'success' && '✅' || needs.infrastructure.result == 'skipped' && '⏭️ Skipped' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Function App | ${{ needs.function-app.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.frontend.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.frontend.result }}" == "success" ]; then
            echo "## 🚀 Deployment Complete!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Your Healthcare Transcription Service is now live." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ -n "${{ steps.urls.outputs.frontend_url || needs.infrastructure.outputs.frontendWebsiteUrl }}" ]; then
              echo "**Frontend URL:** ${{ steps.urls.outputs.frontend_url || needs.infrastructure.outputs.frontendWebsiteUrl }}" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**API URL:** ${{ steps.urls.outputs.func_url }}" >> $GITHUB_STEP_SUMMARY
            fi
          fi
