# GitHub Actions workflow for deploying the frontend to Azure Storage static website hosting
name: 3. Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:
    inputs:
      resourceGroup:
        description: 'Azure Resource Group (for auto-config)'
        required: false
        default: 'healthtranscribe-uk-rg'
      storageAccountName:
        description: 'Frontend storage account name (optional)'
        required: false

env:
  AZURE_RESOURCE_GROUP: ${{ github.event.inputs.resourceGroup || 'healthtranscribe-uk-rg' }}

jobs:
  build-and-deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Determine frontend storage account
        id: storage
        run: |
          if [ -n "${{ github.event.inputs.storageAccountName }}" ]; then
            ACCOUNT_NAME="${{ github.event.inputs.storageAccountName }}"
          else
            ACCOUNT_NAME=$(az storage account list \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "[?tags.role=='frontend-static-site'].name | [0]" \
              -o tsv)
          fi

          if [ -z "$ACCOUNT_NAME" ]; then
            echo "❌ Error: frontend storage account was not found!"
            exit 1
          fi

          echo "name=$ACCOUNT_NAME" >> $GITHUB_OUTPUT
          echo "✓ Frontend storage account: $ACCOUNT_NAME"

      - name: Auto-configure API URL
        run: |
          FUNC_NAME=$(az functionapp list -g ${{ env.AZURE_RESOURCE_GROUP }} --query "[0].name" -o tsv 2>/dev/null || echo "")

          if [ -n "$FUNC_NAME" ]; then
            echo "✓ Found Function App: $FUNC_NAME"

            printf "window.APP_CONFIG = {\n  apiBaseUrl: 'https://%s.azurewebsites.net/api'\n};\n" "$FUNC_NAME" > frontend/config.js

            echo "✓ Frontend configured for: https://${FUNC_NAME}.azurewebsites.net/api"
          else
            echo "⚠️ Could not find Function App - using existing configuration"
          fi

      - name: Enable static website
        run: |
          ACCOUNT_NAME="${{ steps.storage.outputs.name }}"

          az storage blob service-properties update \
            --account-name "$ACCOUNT_NAME" \
            --auth-mode login \
            --static-website \
            --index-document index.html \
            --404-document index.html

      - name: Grant frontend upload access
        run: |
          ACCOUNT_NAME="${{ steps.storage.outputs.name }}"
          ACCOUNT_ID=$(az storage account show --name "$ACCOUNT_NAME" --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query id -o tsv)
          APP_ID=$(az account show --query user.name -o tsv)
          OBJECT_ID=$(az ad sp show --id "$APP_ID" --query id -o tsv)

          az role assignment create \
            --assignee-object-id "$OBJECT_ID" \
            --assignee-principal-type ServicePrincipal \
            --role "Storage Blob Data Contributor" \
            --scope "$ACCOUNT_ID" \
            --only-show-errors || true

          sleep 30

      - name: Upload frontend to static website
        run: |
          ACCOUNT_NAME="${{ steps.storage.outputs.name }}"

          az storage blob delete-batch \
            --account-name "$ACCOUNT_NAME" \
            --auth-mode login \
            --source '$web' \
            --pattern '*' || true

          az storage blob upload-batch \
            --account-name "$ACCOUNT_NAME" \
            --auth-mode login \
            --destination '$web' \
            --source frontend \
            --overwrite

      - name: Output website URL
        run: |
          URL=$(az storage account show \
            --name "${{ steps.storage.outputs.name }}" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query 'primaryEndpoints.web' -o tsv)
          echo "Frontend URL: $URL"

      - name: Output summary
        run: |
          URL=$(az storage account show \
            --name "${{ steps.storage.outputs.name }}" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query 'primaryEndpoints.web' -o tsv)
          echo "## Frontend Deployed! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The frontend has been deployed successfully." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend URL:** $URL" >> $GITHUB_STEP_SUMMARY
