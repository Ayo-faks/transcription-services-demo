# GitHub Actions workflow for deploying the frontend to Azure Storage static website hosting
name: 3. Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend-react/**'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'frontend-react/**'
  workflow_dispatch:
    inputs:
      resourceGroup:
        description: 'Azure Resource Group (for auto-config)'
        required: false
        default: 'healthtranscribe-uk-rg'
      functionAppName:
        description: 'Existing Function App name for runtime API config override'
        required: false
        default: ''
      storageAccountName:
        description: 'Frontend storage account name (optional)'
        required: false
      voiceLiveGatewayBaseUrl:
        description: 'Optional Voice Live gateway base URL override for frontend config.js'
        required: false
        default: ''

env:
  AZURE_RESOURCE_GROUP: ${{ github.event.inputs.resourceGroup || 'healthtranscribe-uk-rg' }}

jobs:
  build-and-deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Determine frontend storage account
        id: storage
        run: |
          if [ -n "${{ github.event.inputs.storageAccountName }}" ]; then
            ACCOUNT_NAME="${{ github.event.inputs.storageAccountName }}"
          else
            ACCOUNT_NAME=$(az storage account list \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "[?tags.role=='frontend-static-site'].name | [0]" \
              -o tsv)
          fi

          if [ -z "$ACCOUNT_NAME" ]; then
            echo "❌ Error: frontend storage account was not found!"
            exit 1
          fi

          echo "name=$ACCOUNT_NAME" >> $GITHUB_OUTPUT
          echo "✓ Frontend storage account: $ACCOUNT_NAME"

      - name: Auto-configure API URL
        run: |
          FUNC_NAME="${{ github.event.inputs.functionAppName }}"
          VOICE_LIVE_GATEWAY_BASE_URL="${{ github.event.inputs.voiceLiveGatewayBaseUrl }}"

          if [ -z "$FUNC_NAME" ]; then
            FUNC_NAME=$(az functionapp list -g ${{ env.AZURE_RESOURCE_GROUP }} --query "[0].name" -o tsv 2>/dev/null || echo "")
          fi

          if [ -n "$FUNC_NAME" ]; then
            API_BASE_URL="https://${FUNC_NAME}.azurewebsites.net/api"
            echo "✓ Found Function App: $FUNC_NAME"

            perl -0pi -e "s|window\\.APP_CONFIG\\.apiBaseUrl = '.*?';|window.APP_CONFIG.apiBaseUrl = '$API_BASE_URL';|" frontend-react/public/config.js

            if [ -n "$VOICE_LIVE_GATEWAY_BASE_URL" ]; then
              perl -0pi -e "s|gatewayBaseUrl: '.*?'|gatewayBaseUrl: '$VOICE_LIVE_GATEWAY_BASE_URL'|" frontend-react/public/config.js
            fi

            grep -q "window.APP_CONFIG.apiBaseUrl = '$API_BASE_URL';" frontend-react/public/config.js
            grep -q "window.APP_CONFIG.voiceLive" frontend-react/public/config.js

            echo "✓ Frontend configured for: $API_BASE_URL"
          else
            echo "⚠️ Could not find Function App - using existing configuration"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend-react
        run: npm ci

      - name: Build React frontend
        working-directory: frontend-react
        run: npm run build

      - name: Enable static website
        run: |
          ACCOUNT_NAME="${{ steps.storage.outputs.name }}"

          az storage blob service-properties update \
            --account-name "$ACCOUNT_NAME" \
            --auth-mode login \
            --static-website \
            --index-document index.html \
            --404-document index.html

      - name: Grant frontend upload access
        run: |
          ACCOUNT_NAME="${{ steps.storage.outputs.name }}"
          ACCOUNT_ID=$(az storage account show --name "$ACCOUNT_NAME" --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query id -o tsv)
          APP_ID=$(az account show --query user.name -o tsv)
          OBJECT_ID=$(az ad sp show --id "$APP_ID" --query id -o tsv)

          az role assignment create \
            --assignee-object-id "$OBJECT_ID" \
            --assignee-principal-type ServicePrincipal \
            --role "Storage Blob Data Contributor" \
            --scope "$ACCOUNT_ID" \
            --only-show-errors || true

          sleep 30

      - name: Upload frontend to static website
        run: |
          ACCOUNT_NAME="${{ steps.storage.outputs.name }}"

          az storage blob delete-batch \
            --account-name "$ACCOUNT_NAME" \
            --auth-mode login \
            --source '$web' \
            --pattern '*' || true

          az storage blob upload-batch \
            --account-name "$ACCOUNT_NAME" \
            --auth-mode login \
            --destination '$web' \
            --source frontend-react/dist \
            --overwrite

      - name: Output website URL
        run: |
          URL=$(az storage account show \
            --name "${{ steps.storage.outputs.name }}" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query 'primaryEndpoints.web' -o tsv)
          echo "Frontend URL: $URL"

      - name: Verify landing page
        run: |
          URL=$(az storage account show \
            --name "${{ steps.storage.outputs.name }}" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query 'primaryEndpoints.web' -o tsv)

          INDEX_HTML=$(curl -fsS --retry 6 --retry-delay 10 --retry-all-errors "$URL")
          printf "%s" "$INDEX_HTML" | grep -q 'id="root"'

          CONFIG_JS=$(curl -fsS --retry 6 --retry-delay 10 --retry-all-errors "${URL}config.js")
          printf "%s" "$CONFIG_JS" | grep -q 'apiBaseUrl'
          printf "%s" "$CONFIG_JS" | grep -q 'voiceLive'
          printf "%s" "$CONFIG_JS" | grep -q 'gatewayBaseUrl'

          echo "Frontend landing page and runtime config smoke checks passed."

      - name: Output summary
        run: |
          URL=$(az storage account show \
            --name "${{ steps.storage.outputs.name }}" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query 'primaryEndpoints.web' -o tsv)
          echo "## Frontend Deployed! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The frontend has been deployed successfully." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend URL:** $URL" >> $GITHUB_STEP_SUMMARY
